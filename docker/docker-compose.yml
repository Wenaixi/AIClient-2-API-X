services:
  aiclient-api:
    # 使用本地构建镜像
    image: aiclient2api:local
    container_name: aiclient2api
    restart: unless-stopped
    ports:
      - "3033:3000"
      - "8085-8087:8085-8087"
      - "1455:1455"
      - "19876-19880:19876-19880"
    volumes:
      - ../configs:/app/configs
    environment:
      - ARGS=
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
