services:
  aiclient-api:
    # 方式一：使用预构建镜像（跳过构建，直接启动）
    # 使用方法: docker compose -f docker/docker-compose.build.yml up -d
    image: aiclient2api:local
    container_name: aiclient2api
    restart: unless-stopped
    ports:
      - "3033:3000"
      - "8085-8087:8085-8087"
      - "1455:1455"
      - "19876-19880:19876-19880"
    volumes:
      - ${PWD}/configs:/app/configs
    environment:
      - ARGS=
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
