# 开发覆盖配置 - 热重载模式
# 使用方法: docker compose -f docker/docker-compose.yml -f docker/docker-compose.dev.yml up -d --build
# 注意: 挂载源码为只读 (:ro)，避免容器内修改影响宿主机

services:
  aiclient-api:
    volumes:
      # 挂载源代码以支持热重载（--watch），保留 node_modules
      - ${PWD}/../src:/app/src:ro
      - ${PWD}/../package.json:/app/package.json:ro
    # 使用 --watch 模式运行，支持文件变化热重载
    command: ["sh", "-c", "node --watch src/core/master.js $ARGS"]
